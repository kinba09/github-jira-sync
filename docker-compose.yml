services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: github-jira-sync-backend
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./rules:/app/rules
      - ./tenants.json:/app/tenants.json
    restart: unless-stopped
